exclude: "unused import"
files:
- path: "foo/v1/foo.proto"
  text: |
    syntax = "proto3";
    package foo.v1;

    import "foo/v1/bar.proto";
    import "foo/v2/foo.proto";

- path: "foo/v1/bar.proto"
  import: true
  text: |
    syntax = "proto3";
    package foo.v1;

    import "foo/v2/foo.proto";

- path: "foo/v2/foo.proto"
  import: true
  text: |
    syntax = "proto3";
    package foo.v2;

    import "foo/v1/bar.proto";
