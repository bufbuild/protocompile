syntax = "proto2";

package test;

message M {
    message N {
        extensions 1;
    }
    message P {
        enum X { N = 1; }
        extend N {  // Does not skip .test.M.P.N
            optional int32 n = 1;  
        }
    }

    message Q {
        enum N { Q = 1; }
        extend N {  // Does not skip .test.M.Q.N
            optional int32 n = 1;  
        }
    }
}