# Test block comment formatting (rule 21): asterisk-style normalization,
# plain-style preservation, blank interior lines, inline block comments,
# and degenerate multi-line cases.

format: true

source: |
  /*
      * Asterisk style with inconsistent indent.
       * Second line.
        */
  syntax /* inline */ = "proto3";

  message Foo {
      /*
          * Body comment.
           * Second line.
            */
    string name = 1;
  }

  /*
     This is plain style.

     More content here.
  */
  message Bar {}

  /*
   * Line before blank.
   *
   * Line after blank.
   */
  message Baz {}

  /* Degenerate
     comment. */
  message Qux {}
