# Tests that corrupt/invalid definitions (DefKindInvalid) are printed
# rather than silently dropped. These arise from parse errors such as
# missing names, missing signatures, etc.

source: |
  syntax = "proto3";
  message {}
  message M {
    int32 = 1;
  }
  service S {
    rpc (Req) returns (Resp);
  }
