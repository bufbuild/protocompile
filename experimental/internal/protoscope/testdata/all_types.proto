syntax = "proto3";

package test;

option go_package = "github.com/bufbuild/protocompile/experimental/internal/protoscope/testdata/alltypes";

message AllTypes {
  double f_double = 1;
  float f_float = 2;
  int32 f_int32 = 3;
  int64 f_int64 = 4;
  uint32 f_uint32 = 5;
  uint64 f_uint64 = 6;
  sint32 f_sint32 = 7;
  sint64 f_sint64 = 8;
  fixed32 f_fixed32 = 9;
  fixed64 f_fixed64 = 10;
  sfixed32 f_sfixed32 = 11;
  sfixed64 f_sfixed64 = 12;
  bool f_bool = 13;
  string f_string = 14;
  bytes f_bytes = 15;
  NestedMessage f_nested = 16;
  NestedEnum f_enum = 17;
  repeated int32 f_repeated_int32 = 18; // packed
  map<string, string> f_map = 19;

  message NestedMessage {
    int32 val = 1;
  }

  enum NestedEnum {
    ZERO = 0;
    ONE = 1;
  }
}

message Proto2GroupTest {
  // Group syntax is only supported in proto2 or editions, not proto3
}
